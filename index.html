<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ethics Scenario Study</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      line-height: 1.6;
      background-color: #f9f9f9;
    }
    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      margin-top: 30px;
    }
    .scenario {
      margin-top: 20px;
      padding: 20px;
      border-left: 5px solid #007BFF;
      background: #f4f8ff;
      border-radius: 5px;
    }
    .btn {
      margin-top: 30px;
      padding: 12px 20px;
      font-size: 16px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #0056b3;
    }
    .note {
      margin-top: 20px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Engineering Ethics Study</h1>
    <p>Please read both scenarios carefully. You will answer questions about them afterwards.</p>

    <!-- Scenario A -->
    <h2>Scenario A (Original)</h2>
    <div class="scenario">
      <p>PASTE YOUR ORIGINAL SCENARIO HERE</p>
    </div>

    <!-- Scenario B -->
    <h2>Scenario B (LLM-Enhanced)</h2>
    <div class="scenario">
      <p>PASTE YOUR LLM-ENHANCED SCENARIO HERE</p>
    </div>

    <button class="btn" onclick="goToSurvey()">Continue to Survey</button>

    <p class="note">Make sure you have read both scenarios before proceeding.</p>
  </div>

  <script>
    function goToSurvey() {
      window.location.href = "https://your-google-form-link-here";
    }
  </script>
</body>
</html>
